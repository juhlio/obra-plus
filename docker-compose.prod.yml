services:
  app:
    build: ./docker/php
    container_name: obraplus-app
    restart: always
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    networks:
      - obraplus-network

  nginx:
    build:
      context: ./docker/nginx
      target: prod
    container_name: obraplus-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/var/www/html/public/frontend
    depends_on:
      - app
      - frontend-builder
    networks:
      - obraplus-network

  db:
    image: mysql:8.0
    container_name: obraplus-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME}", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - obraplus-network

  frontend-builder:
    image: node:20-alpine
    container_name: obraplus-frontend-builder
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run build"
    networks:
      - obraplus-network

volumes:
  mysql-data:

networks:
  obraplus-network:
    driver: bridge

services:
  app:
    build: ./docker/php
    container_name: obraplus-app
    restart: always
    volumes:
      - ./backend:/var/www/html
      - storage-data:/var/www/html/storage/app/public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - obraplus-network

  nginx:
    build:
      context: ./docker/nginx
      target: prod
    container_name: obraplus-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html
      - ./frontend/dist:/var/www/frontend:ro
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - obraplus-network

  db:
    image: mysql:8.0
    container_name: obraplus-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME}", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - obraplus-network

  # Certbot — renovação automática de SSL (Let's Encrypt)
  certbot:
    image: certbot/certbot:latest
    container_name: obraplus-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    depends_on:
      - nginx

volumes:
  mysql-data:
  storage-data:
  certbot-www:
  certbot-certs:

networks:
  obraplus-network:
    driver: bridge

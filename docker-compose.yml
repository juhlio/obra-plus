services:
  app:
    build: ./docker/php
    container_name: obraplus-app
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - obraplus-network

  nginx:
    build:
      context: ./docker/nginx
      target: dev
    container_name: obraplus-nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - obraplus-network

  db:
    image: mysql:8.0
    container_name: obraplus-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-obraplus}
      MYSQL_USER: ${DB_USERNAME:-obraplus}
      MYSQL_PASSWORD: ${DB_PASSWORD:-senha123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "obraplus", "-psenha123"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - obraplus-network

  frontend:
    image: node:20-alpine
    container_name: obraplus-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - obraplus-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: obraplus-pma
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USERNAME:-obraplus}
      PMA_PASSWORD: ${DB_PASSWORD:-senha123}
    depends_on:
      - db
    networks:
      - obraplus-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: obraplus-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - obraplus-network

volumes:
  mysql-data:

networks:
  obraplus-network:
    driver: bridge

# ── HTTP → redireciona para HTTPS ─────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Desafio ACME do Certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;
    client_max_body_size 50M;

    # Certificados SSL (gerados pelo Certbot)
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               application/xml image/svg+xml font/woff2;

    # Headers de segurança
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── React SPA ────────────────────────────────────────────────────────────
    root  /var/www/frontend;
    index index.html;

    # Assets buildados pelo Vite (nomes com hash → cache longo)
    location ~* \.(js|css|woff2|woff|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA — todas as rotas do React caem aqui
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Laravel API ──────────────────────────────────────────────────────────
    # /api/*, /storage/*, /up (health check)
    location ~ ^/(api|storage|up)(/|$) {
        root /var/www/html/public;
        try_files $uri $uri/ @laravel;
    }

    # PHP-FPM — sempre aponta para o index.php do Laravel
    location @laravel {
        fastcgi_pass   app:9000;
        fastcgi_param  SCRIPT_FILENAME  /var/www/html/public/index.php;
        fastcgi_param  DOCUMENT_ROOT    /var/www/html/public;
        fastcgi_param  REQUEST_URI      $request_uri;
        include        fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120;
    }

    # Bloqueia acesso a arquivos ocultos (exceto ACME)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
